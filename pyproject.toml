[tool.black]
line-length = 80
target-version = ["py312"]
include = "\\.pyi?$"
extend-exclude = """
(
  /venv/
  |/.venv/
)
"""

[tool.isort]
profile = "black"
line_length = 80
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
split_on_trailing_comma = true
lines_after_imports = 2
known_first_party = [
  "routes",
  "volume",
  "screen",
  "system",
  "keyboard",
  "devices",
  "telegram_bot",
  "bot",
  "client",
  "data",
  "admin",
  "utils",
]
skip = [
  "venv",
  ".venv",
]
