services:
  telegram_bot:
    build: ./telegram_bot
    container_name: cc_telegram_bot
    restart: unless-stopped
    env_file:
      - ./telegram_bot/.env
    depends_on:
      sqelf:
        condition: service_started
      seq:
        condition: service_healthy
    logging:
      driver: gelf
      options:
        gelf-address: "udp://host.docker.internal:12201"
        tag: "cc.telegram_bot"

  sqelf:
    image: datalust/sqelf:latest
    container_name: cc_sqelf
    restart: unless-stopped
    environment:
      - SEQ_ADDRESS=http://seq
    ports:
      - "12201:12201/udp"
    depends_on:
      seq:
        condition: service_healthy

  seq:
    image: datalust/seq:latest
    container_name: cc_seq
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - "${SEQ_PORT}:80"
    volumes:
      - seq_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  seq_data:
